<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(180deg, #000510 0%, #001040 50%, #0050b0 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      color: white;
      text-align: center;
      padding: 80px;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 60px;
    }
    
    .diamond {
      width: 24px;
      height: 24px;
      background: white;
      transform: rotate(45deg);
    }
    
    .logo-text {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 4px;
    }
    
    h1 {
      font-size: 72px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 40px;
      max-width: 900px;
    }
    
    .tagline {
      font-size: 28px;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
    }
    
    .glow {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(30,144,255,0.3) 0%, transparent 70%);
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="diamond"></div>
    <span class="logo-text">FOUNTAIN</span>
  </div>
  <h1>We bring AI into the physical world, with builders.</h1>
  <p class="tagline">BAY AREA × SHENZHEN</p>
  <div class="glow"></div>
</body>
</html>
