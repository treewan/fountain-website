<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      font-family: Inter, sans-serif; 
      background: #f8fafc; 
      padding: 40px;
      display: flex;
      flex-wrap: wrap;
      gap: 60px;
    }
    .sample {
      text-align: center;
    }
    .sample p {
      margin-top: 16px;
      font-size: 14px;
      color: #64748b;
    }
    svg { opacity: 0.6; }
  </style>
</head>
<body>

<div class="sample">
  <svg width="120" height="200" viewBox="0 0 120 200" fill="none">
    <!-- 样式1: 弯曲弧形 -->
    <path d="M60 200 Q55 160, 45 120 Q35 80, 50 40 Q55 20, 60 10" stroke="#d1d5db" stroke-width="2" fill="none"/>
    <ellipse cx="42" cy="35" rx="12" ry="6" fill="#e5e7eb" transform="rotate(-60 42 35)"/>
    <ellipse cx="38" cy="55" rx="12" ry="6" fill="#e5e7eb" transform="rotate(-55 38 55)"/>
    <ellipse cx="36" cy="75" rx="11" ry="5" fill="#e5e7eb" transform="rotate(-50 36 75)"/>
    <ellipse cx="38" cy="95" rx="10" ry="5" fill="#e5e7eb" transform="rotate(-45 38 95)"/>
    <ellipse cx="68" cy="30" rx="12" ry="6" fill="#e5e7eb" transform="rotate(30 68 30)"/>
    <ellipse cx="58" cy="50" rx="12" ry="6" fill="#e5e7eb" transform="rotate(35 58 50)"/>
    <ellipse cx="52" cy="70" rx="11" ry="5" fill="#e5e7eb" transform="rotate(40 52 70)"/>
    <ellipse cx="50" cy="90" rx="10" ry="5" fill="#e5e7eb" transform="rotate(45 50 90)"/>
    <ellipse cx="55" cy="18" rx="6" ry="10" fill="#e5e7eb" transform="rotate(-10 55 18)"/>
  </svg>
  <p>1. 弯曲弧形</p>
</div>

<div class="sample">

    <path d="M30 200 Q40 150, 60 100 Q80 60, 90 30" stroke="#d1d5db" stroke-width="2" fill="none"/>

    <ellipse cx="78" cy="55" rx="10" ry="5" fill="#e5e7eb" transform="rotate(55 78 55)"/>
    <ellipse cx="70" cy="70" rx="10" ry="5" fill="#e5e7eb" transform="rotate(45 70 70)"/>
    <ellipse cx="62" cy="85" rx="9" ry="5" fill="#e5e7eb" transform="rotate(35 62 85)"/>

  <p>2. 低垂弯曲</p>
</div>

<div class="sample">
  <svg width="120" height="200" viewBox="0 0 120 200" fill="none">
    <!-- 样式3: 优雅S曲线 -->
    <path d="M60 200 Q40 160, 50 120 Q60 80, 70 50 Q75 30, 70 15" stroke="#d1d5db" stroke-width="2" fill="none"/>

<div class="sample">
  <svg width="120" height="200" viewBox="0 0 120 200" fill="none">

    <path d="M60 200 L58 100 Q56 60, 60 30" stroke="#d1d5db" stroke-width="1.5" fill="none"/>

<div class="sample">

</div>

</body>
</html>
